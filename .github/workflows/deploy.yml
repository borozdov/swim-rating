name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch: # ручной запуск кнопкой на вкладке Actions — без нового коммита

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Дефолтная версия, которую сама экшена нашла закэшированной (3.90.0), не видит
          # main в wrangler.jsonc и падает с "Missing entry-point" — тот же конфиг с
          # актуальным Wrangler (проверено локально, 4.112.0) находит его нормально.
          wranglerVersion: "4"
